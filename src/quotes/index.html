	<li>
		<figure>
			<blockquote>
				<p>
					<span class="lead-in">Let me think about the people</span> who I care
					about the most and how, when they fail or disappoint me: I still love
					them; I still give them chances; and I still see the best in them. Let
					me extend that generosity to myself.
				</p>
				<p>
					Let me find and use metaphors to help me understand the world around
					me and give me the strength to get rid of them when it’s apparent they
					no longer work.
				</p>
				<p>
					Let me thank the parts of me that I don’t understand or are outside of
					my rational control like my creativity and my courage.
				</p>
				<p class="omission">…</p>
				<p>
					There is no need to sharpen my pencils anymore. My pencils are sharp
					enough. Even the dull ones will make a mark.
				</p>
			</blockquote>
			<figcaption>
				<cite>
					Ze Frank,
					<a
						class="title"
						href="https://www.youtube.com/watch?v=RYlCVwxoL_g"
						rel="external nofollow"
						>An Invocation for Beginnings</a
					>
					(<time datetime="2012-04-10">2012</time>)
				</cite>
			</figcaption>
		</figure>

	<li>
		<figure>
			<blockquote>
				<p>
					<span class="lead-in">All of us who do creative work</span>, we get
					into it because we have good taste. You’re wanna make
					<abbr title="television">TV</abbr> because you love
					<abbr title="television">TV</abbr>—because there’s stuff that you just
					<em>love</em>.
				</p>
				<p>
					<span class="omission">…</span> But it’s like there’s this gap; that
					for the first couple years that you’re making stuff, what you’re
					making isn’t so good. <span class="omission">…</span> It’s really not
					that great. It’s trying to be good. It has ambition to be good.
				</p>
				<p>
					But your taste—the thing that got you into the game—your taste is
					still killer and your taste is good enough that you can tell that what
					you’re making is kind of a disappointment to you. You can tell that
					it’s still sort of crappy. A lot of people never get past that phase.
					A lot of people, at that point, they quit.
				</p>
				<p>
					<span class="omission">…</span> Everybody I know who does interesting,
					creative work, they went through a phase of years where: they had
					really good taste; they could tell what they were making wasn’t as
					good as they wanted it to be; they knew it fell short.
					<span class="omission">…</span> It didn’t have the special thing
					[they] wanted it to have.
				</p>
				<p>
					<span class="omission">…</span> Everybody goes through that.
					<span class="omission">…</span> It’s totally normal and the most
					important possible thing you could do is do a lot of work. Do a huge
					volume of work.
				</p>
			</blockquote>
			<figcaption>
				<cite>
					Ira Glass,
					<a
						class="title"
						href="https://www.youtube.com/watch?v=X2wLP0izeJE"
						rel="external nofollow"
						>On Storytelling</a
					>
					(<time datetime="2009">2009</time>)
				</cite>
			</figcaption>
		</figure>

			<blockquote>
				<p>
					<span class="lead-in">I myself find that I trust</span> my own writing
					most, and others seem to trust it most, too, when I sound most like a
					person from Indianapolis, which is what I am. What alternatives do I
					have? The one most vehemently recommended by teachers has no doubt
					been pressed on you, as well: to write like cultivated Englishmen of a
					century or more ago.
				</p>
			</blockquote>
			<figcaption>
				<cite>
					Kurt Vonnegut,

			</figcaption>
		</figure>

	<li>
		<figure>
			<blockquote>
				<p>
					<span class="lead-in">What worries me are the consequences</span> of a
					diet comprised mostly of fake-connectedness, makebelieve insight, and
					unedited first drafts of <em>everything</em>. I think it’s making us
					small. I know that whenever I become aware of it, I realize how small
					it can make me. So, I’ve come to despise it.
				</p>
				<p>
					With this diet metaphor in mind, I want to, if you like,
					<em>start eating better</em>. But, I also want to start
					<em>growing a tastier tomato</em>—regardless of how easy it is to
					pick, package, ship, or vend. The tomato is the story, my friend.
				</p>
			</blockquote>
			<figcaption>
				<cite>
					Merlin Mann,
					<a
						class="title"
						href="https://www.merlinmann.com/better"
						rel="external nofollow"
						>Better</a
					>
					(<time datetime="2008-09-03">2008</time>)
				</cite>
			</figcaption>
		</figure>
	</li>

				<p>
					<span class="lead-in">When you have the microphone,</span> what you
					say matters, even when you’re just kidding. It’s so easy to take

				<p>
					<span class="lead-in">Email is a wonderful thing</span> for people
					whose role in life is to be on top of things. But not for me; my role
					is to be on the bottom of things. What I do takes long hours of

					for such study.
